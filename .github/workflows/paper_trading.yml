name: Crypto AI Bot — Paper Trading

on:
  schedule:
    # Ejecutar cada hora en el minuto 0
    - cron: '0 * * * *'
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  paper-trading:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write   # necesario para hacer commit del estado

    steps:
      # 1. Descargar el repositorio
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install ccxt pandas xgboost scikit-learn \
                      joblib numpy scipy --quiet
          pip install "pandas-ta @ https://github.com/twopirllc/pandas-ta/archive/refs/heads/development.zip" --quiet
          pip install torch --quiet

      # 4. Ejecutar el bot
      - name: Ejecutar paper trading
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python paper_trading.py

      # 5. Guardar el estado actualizado en el repositorio
      - name: Guardar estado
        if: always()
        run: |
          git config user.name  "crypto-bot"
          git config user.email "bot@crypto-ai.com"
          git add paper_trading/
          git diff --staged --quiet || git commit -m "Estado bot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
