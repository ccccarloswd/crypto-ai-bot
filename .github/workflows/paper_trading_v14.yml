name: Paper Trading v14

on:
  schedule:
    - cron: '35 * * * *'  # cada hora en el minuto 35 (desfasado de v13)
  workflow_dispatch:

jobs:
  paper-trading-v14:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar bot v14
        env:
          TELEGRAM_TOKEN_V14:   ${{ secrets.TELEGRAM_TOKEN_V14 }}
          TELEGRAM_CHAT_ID_V14: ${{ secrets.TELEGRAM_CHAT_ID_V14 }}
        run: python paper_trading_v14.py

      - name: Guardar estado
        if: always()
        run: |
          git config user.name  "crypto-bot-v14"
          git config user.email "bot-v14@crypto-ai.com"
          git add paper_trading/v14/
          git diff --staged --quiet || git commit -m "v14 estado $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
